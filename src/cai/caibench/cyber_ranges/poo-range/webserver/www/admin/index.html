<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - P.O.O.</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 40px;
        }
        .panel {
            max-width: 800px;
            margin: 0 auto;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 { color: #00ff88; }
        .quote {
            font-style: italic;
            color: #888;
            margin: 20px 0;
            padding: 20px;
            border-left: 3px solid #00ff88;
        }
        .flag {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Admin Dashboard</h1>
        <div class="quote">
            "I can't go back to yesterday, because i was a different person then..."<br>
            - Alice in Wonderland
        </div>
        <div class="flag">
            Flag : POO{4882bd2ccfd4b5318978540d9843729f}
        </div>
    </div>
</body>
</html>
