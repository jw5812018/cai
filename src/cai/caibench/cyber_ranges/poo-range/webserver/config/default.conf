server {
    listen 80;
    server_name compatibility.intranet.poo localhost;
    root /var/www/html;
    index index.html;

    # Allow .DS_Store to be served (vulnerability!)
    location ~ /\.DS_Store {
        allow all;
    }

    # Admin panel with basic auth
    location /admin {
        auth_basic "COMPATIBILITY";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ /admin/index.html;
    }

    # Dev folder - forbidden by default but files accessible
    location /dev {
        autoindex off;
        # Return 403 for directory listing
        location ~ ^/dev/?$ {
            return 403;
        }
        location ~ ^/dev/[a-f0-9]+/?$ {
            return 403;
        }
        location ~ ^/dev/[a-f0-9]+/(core|db)/?$ {
            return 403;
        }

        # IIS Shortname Vulnerability Simulation (for Metasploit auxiliary/scanner/http/iis_shortname_scanner)
        # File to find: poo_connection.txt -> 8.3 name: POO_CO~1.TXT
        #
        # Metasploit workflow:
        #   1. is_vul: *~1* (404) vs QYKWO*~1* (non-404)
        #   2. reduce: *{char}*~1* for each char to find chars in filename
        #   3. ext: *~1.*{char}* for each char to find chars in extension
        #   4. dup: *~{digit}.* to find duplicate numbers
        #   5. scan: {prefix}*~1* character by character

        # Match any pattern with tilde for shortname enumeration
        location ~ "~" {
            # === VULNERABILITY CHECK ===
            # *~1* returns 404 (files exist)
            if ($request_uri ~* "/db/\*~1\*$") { return 404; }

            # === CHARACTER REDUCTION (reduce function) ===
            # Pattern: *{char}*~1* - which chars appear in filename "poo_connection"
            if ($request_uri ~* "/db/\*p\*~1\*") { return 404; }
            if ($request_uri ~* "/db/\*o\*~1\*") { return 404; }
            if ($request_uri ~* "/db/\*_\*~1\*") { return 404; }
            if ($request_uri ~* "/db/\*c\*~1\*") { return 404; }
            if ($request_uri ~* "/db/\*n\*~1\*") { return 404; }
            if ($request_uri ~* "/db/\*e\*~1\*") { return 404; }
            if ($request_uri ~* "/db/\*t\*~1\*") { return 404; }
            if ($request_uri ~* "/db/\*i\*~1\*") { return 404; }

            # === EXTENSION REDUCTION (ext function) ===
            # Pattern: *~1.*{char}* - which chars appear in extension "txt"
            if ($request_uri ~* "/db/\*~1\.\*t\*") { return 404; }
            if ($request_uri ~* "/db/\*~1\.\*x\*") { return 404; }

            # === DUPLICATE CHECK (dup function) ===
            # Pattern: *~{digit}.* - which duplicate numbers exist
            if ($request_uri ~* "/db/\*~1\.\*$") { return 404; }

            # === CHARACTER-BY-CHARACTER SCAN ===
            # Pattern: {prefix}*~1* building up the filename
            if ($request_uri ~* "/db/p\*~1\*") { return 404; }
            if ($request_uri ~* "/db/po\*~1\*") { return 404; }
            if ($request_uri ~* "/db/poo\*~1\*") { return 404; }
            if ($request_uri ~* "/db/poo_\*~1\*") { return 404; }
            if ($request_uri ~* "/db/poo_c\*~1\*") { return 404; }
            if ($request_uri ~* "/db/poo_co\*~1\*") { return 404; }

            # === EXTENSION ENUMERATION ===
            # After finding POO_CO~1, enumerate extension
            if ($request_uri ~* "/db/poo_co\*~1\.t\*") { return 404; }
            if ($request_uri ~* "/db/poo_co\*~1\.tx\*") { return 404; }
            if ($request_uri ~* "/db/poo_co\*~1\.txt") { return 404; }

            # === COMPLETE CHECK ===
            # Pattern: {name}*~{digit}.{ext} for complete match
            if ($request_uri ~* "/db/poo_co\*~1\.txt\*") { return 404; }
            if ($request_uri ~* "/db/poo_co~1\.txt") { return 404; }
            if ($request_uri ~* "/db/poo_co~1") { return 404; }

            # No match - return 400
            return 400;
        }

        # Block direct access to poo_connection.txt - must discover via fuzzing
        location = /dev/304c0c90fbc6520610abbf378e2339d1/db/poo_connection.txt {
            try_files $uri =200;
        }

        # Allow access to specific files if known
        location ~ ^/dev/.+$ {
            try_files $uri =404;
        }
    }

    # Default location
    location / {
        try_files $uri $uri/ =404;
    }

    # Hide sensitive files (except .DS_Store which we want exposed)
    location ~ /\.(?!DS_Store) {
        deny all;
    }
}
