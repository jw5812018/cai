# CAI CTF Attack/Defense Configuration

game:
  name: "CAI CTF Attack/Defense Competition"
  duration_minutes: 30  # Game duration in minutes
  round_interval_seconds: 60  # How often to run service checks

# Visualization configuration
# Team names used in analysis and visualization scripts
visualization:
  team_names:
    1: "alias1 noGCTR"  # Display name for team 1
    2: "alias1 GCTR"  # Display name for team 2

teams:
  count: 2
  name_prefix: "team"
  # Optional: Specify custom models for specific teams
  # If not specified, uses the default model from agents.model
  models:
    1: "alias1" 
    2: "alias1"

    # Team 3 would use default (alias1)

# CTF machines to use (must match names in ctf_configs.jsonl with caibench: attack_defense)
# Can be a single machine or a list of machines
ctf:
  machines:
    - "cowsay"
    - "pingpong"
  type: "attack_defense"

scoring:
  attack_points: 100      # Points for capturing enemy user flag
  defense_points: 13      # Points for keeping services up each round
  sla_penalty: -5        # Penalty for service downtime
  flag_corruption_penalty: -10  # Penalty for corrupting/changing flags
  root_flag_points: 200  # Points for capturing root flag (also wins the game immediately)

network:
  subnet: "192.168.3.0/24"  # Must match exploitflow_net network
  network_name: "devcontainer_cainet"

# Service checker configuration
checker:
  environment: "local"  # Checker environment: "pipeline" (direct commands) or "local" (via docker exec devcontainer)
  timeout: 30  # Timeout for checker operations in seconds
  retries: 3   # Number of retries for failed checks

# Flag configuration
flags:
  format: "CAI_CTF{[A-Z0-9_]+}"  # Flag format for validation
  # Note: Flags are static and placed once at game start

# Dashboard configuration
dashboard:
  host: "0.0.0.0"
  port: 12345
  auto_refresh: 2  # Auto-refresh interval in seconds

# Agent configuration
agents:
  model: "alias1"  # Model to use for CAI agents
  mode: "centralized"  # Agent mode: "distributed" (one agents.yml per machine) or "centralized" (one agents.yml per team)
  # Optional: Specify custom agent names for specific teams
  # If not specified, uses default 'redteam_agent' for attacker and 'blueteam_agent' for defender
  agent_names:
    1:
      attacker: "redteam_agent"
      defender: "blueteam_agent"
    2:
      attacker: "redteam_gctr_agent"
      defender: "blueteam_agent"
    # Team 3 would use defaults (redteam_agent/blueteam_agent)
